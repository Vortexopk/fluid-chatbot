<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth moving fluid background */
        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #311042, #020617);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* Custom scrollbar for frosted container */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-4">

    <!-- Translucent Frosted Glass Card -->
    <div class="w-full max-w-2xl h-[85vh] flex flex-col rounded-3xl bg-white/5 border border-white/10 backdrop-blur-xl shadow-2xl overflow-hidden">
        
        <!-- Header -->
        <div class="px-6 py-4 border-b border-white/10 bg-white/5 flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-purple-400 animate-pulse"></div>
            <h1 class="text-white font-medium tracking-wide">Grok Core Interface</h1>
        </div>

        <!-- Chat Area -->
        <div id="chat-box" class="flex-1 p-6 overflow-y-auto space-y-4 text-sm text-white/90">
            <div class="bg-white/5 border border-white/5 p-3 rounded-2xl max-w-[80%] self-start">
                Hello! Enter a prompt below to communicate with Grok.
            </div>
        </div>

        <!-- Input Section -->
        <div class="p-4 bg-white/5 border-t border-white/10 flex gap-2">
            <input id="user-input" type="text" placeholder="Type a message..." 
                   class="flex-1 px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:border-purple-500 transition-colors placeholder-white/30">
            <button onclick="sendMessage()" class="px-5 py-3 bg-purple-600 hover:bg-purple-500 text-white font-medium rounded-xl transition-all shadow-lg shadow-purple-600/30">
                Send
            </button>
        </div>
    </div>

    <!-- Frontend logic connecting UI to backend API -->
    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Append User Message
            chatBox.innerHTML += `<div class="bg-purple-600/30 border border-purple-500/30 p-3 rounded-2xl max-w-[80%] ml-auto text-right">${text}</div>`;
            userInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Append Loading Indicator
            const loadingId = 'load-' + Date.now();
            chatBox.innerHTML += `<div id="${loadingId}" class="text-white/40 italic">Grok is thinking...</div>`;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                document.getElementById(loadingId).remove();

                // Append Bot Response
                chatBox.innerHTML += `<div class="bg-white/5 border border-white/5 p-3 rounded-2xl max-w-[80%]">${data.response}</div>`;
            } catch {
                document.getElementById(loadingId).innerText = "Error reaching host application.";
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        userInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
