<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aadhunik Manushya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #311042, #020617);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">

    <!-- Translucent Frosted Glass Card -->
    <div class="w-full max-w-2xl h-[85vh] flex flex-col rounded-3xl bg-white/5 border border-white/10 backdrop-blur-xl shadow-2xl overflow-hidden">
        
        <!-- Header -->
        <div class="px-6 py-4 border-b border-white/10 bg-white/5 flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-purple-400 animate-pulse"></div>
            <h1 class="text-white font-medium tracking-wide">Aadhunik Manushya</h1>
        </div>

        <!-- Chat Area -->
        <div id="chat-box" class="flex-1 p-6 overflow-y-auto space-y-4 text-sm text-white/90">
            <div class="bg-white/5 border border-white/5 p-3 rounded-2xl max-w-[80%] self-start">
                Hello! Enter a prompt below to communicate with the model.
            </div>
        </div>

        <!-- Input Section -->
        <div class="p-4 bg-white/5 border-t border-white/10 flex gap-2">
            <input id="user-input" type="text" placeholder="Type a message..." 
                   class="flex-1 px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:border-purple-500 transition-colors placeholder-white/30">
            <button id="send-btn" onclick="sendMessage()" class="px-5 py-3 bg-purple-600 hover:bg-purple-500 text-white font-medium rounded-xl transition-all shadow-lg shadow-purple-600/30">
                Send
            </button>
        </div>
    </div>

    <!-- PRANK MODAL: Hidden by default ('hidden') -->
    <div id="prank-modal" class="hidden absolute inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center p-4 z-50 animate-fade-in">
        <div class="bg-slate-900/90 border border-white/10 p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl flex flex-col items-center">
            <div class="w-12 h-12 rounded-full bg-amber-500/20 text-amber-400 flex items-center justify-center text-xl font-bold mb-4">⚠️</div>
            <h2 class="text-white text-xl font-bold mb-2">XD haha</h2>
            <p class="text-white/60 text-sm mb-6">You have reached your local tier limits. Scan below to unlock <strong>Aadhunik Manushya PRO</strong> for unlimited access.</p>
            
            <!-- UPI Placeholder Square (Put your QR image inside your static folder or link it here) -->
            <div class="w-48 h-48 bg-white p-2 rounded-2xl shadow-inner mb-6 flex items-center justify-center border-4 border-purple-500">
                <img src="/static/qr.png" alt="UPI QR" class="w-full h-full object-contain rounded-xl">
            </div>

            <p class="text-purple-400 font-mono text-xs animate-pulse tracking-wider">⚡ AUTOMATIC ACTIVATION ONCE PAID ⚡</p>
        </div>
    </div>

    <!-- Custom Watermark Branding at Bottom -->
    <div class="absolute bottom-2 text-white/30 text-[10px] font-mono tracking-widest uppercase text-center w-full select-none">
        made by debartha AKA VOTECX
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const prankModal = document.getElementById('prank-modal');

        // Track how many messages the user sends
        let messageCount = 0;
        const MAX_FREE_MESSAGES = 3;

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Increment count
            messageCount++;

            // Append User Message
            chatBox.innerHTML += `<div class="bg-purple-600/30 border border-purple-500/30 p-3 rounded-2xl max-w-[80%] ml-auto text-right">${text}</div>`;
            userInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // 2. Check if prank should trigger after this message
            if (messageCount >= MAX_FREE_MESSAGES) {
                // Disable inputs
                userInput.disabled = true;
                sendBtn.disabled = true;
                userInput.placeholder = "Subscription required...";

                // Delay the popup slightly so they read their last message first
                setTimeout(() => {
                    prankModal.classList.remove('hidden');
                }, 1200);
                return;
            }

            // Append Loading Indicator
            const loadingId = 'load-' + Date.now();
            chatBox.innerHTML += `<div id="${loadingId}" class="text-white/40 italic">Thinking...</div>`;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                document.getElementById(loadingId).remove();

                // Append Bot Response
                chatBox.innerHTML += `<div class="bg-white/5 border border-white/5 p-3 rounded-2xl max-w-[80%]">${data.response}</div>`;
            } catch {
                document.getElementById(loadingId).innerText = "Error reaching host application.";
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        userInput.addEventListener('keydown', (e) => { 
            if(e.key === 'Enter' && !userInput.disabled) sendMessage(); 
        });
    </script>
</body>
</html>
